<div class="px-4 pb-8">
    <div class="bg-blue-100 text-blue-900 p-4 w-full">
        <p class="flex gap-2">
            <mat-icon>info</mat-icon>
            Puede seleccionar una nueva fecha y hora de reprogramación.
        </p>
    </div>
</div>

<div class="px-4">
    <form [formGroup]="reprogramarForm">
        <div class="flex flex-row gap-2">
            <mat-form-field class="w-6/12">
                <mat-label>Fecha de reunión</mat-label>
                <input matInput [matDatepicker]="fechaPicker" [min]="minDate" [max]="maxDate" formControlName="fecha">
                <mat-hint>MM/DD/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="fechaPicker"></mat-datepicker-toggle>
                <mat-datepicker #fechaPicker></mat-datepicker>
            </mat-form-field>
        
            <mat-form-field class="w-6/12">
                <mat-label>Hora de reunión</mat-label>
                <input matInput [matTimepicker]="horaPicker" formControlName="hora">
                <mat-timepicker-toggle matIconSuffix [for]="horaPicker"/>
                <mat-timepicker #horaPicker/>
            </mat-form-field>
        </div>

        <div class="mt-4 mb-8 text-center space-x-2">
            <button type="submit" mat-flat-button>
                <mat-icon>av_timer</mat-icon>
                Reprogramar
            </button>
            <button type="button" mat-stroked-button (click)="regresarLista()">
                <mat-icon>keyboard_return</mat-icon>
                Regresar a la lista
            </button>
        </div>
    </form>

</div>
